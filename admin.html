<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel - KontrakanMaps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        #admin-map { height: 250px; border-radius: 1rem; z-index: 10; }
       .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-1">Admin Panel</h1>
            <p class="text-slate-500 text-center mb-6">KontrakanMaps</p>
            <form id="login-form">
                <div class="mb-4">
                    <label class="text-sm font-medium text-slate-600">Email</label>
                    <input type="email" id="email" class="w-full mt-1 p-2.5 border border-slate-300 rounded-lg" required>
                </div>
                <div class="mb-4">
                    <label class="text-sm font-medium text-slate-600">Password</label>
                    <input type="password" id="password" class="w-full mt-1 p-2.5 border border-slate-300 rounded-lg" required>
                </div>
                <p id="error-msg" class="text-rose-500 text-sm mb-4 text-center h-5"></p>
                <button type="submit" id="login-btn" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-bold hover:bg-indigo-700">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <header class="sticky top-0 bg-white/80 backdrop-blur-lg z-40 border-b border-slate-200">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">KM</div>
                    <h1 class="text-xl font-bold text-slate-800">Admin Dashboard</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-email" class="text-sm text-slate-600 hidden md:block"></span>
                    <div id="connection-status" class="text-xs font-semibold px-3 py-1.5 rounded-full bg-slate-200 text-slate-600">Connecting...</div>
                    <button onclick="bersihkanChat()" class="text-sm bg-rose-100 text-rose-600 font-semibold px-4 py-2 rounded-lg hover:bg-rose-200"><i class="fa-solid fa-trash mr-2"></i>Bersihkan Chat</button>
                    <button id="logout-btn" class="text-sm bg-slate-200 text-slate-700 font-semibold px-4 py-2 rounded-lg hover:bg-slate-300">Logout</button>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 md:p-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="bg-white p-6 rounded-2xl shadow-lg shadow-slate-200/50">
                        <h2 class="font-bold text-lg mb-4 flex items-center gap-2"><i class="fa-solid fa-comments text-indigo-500"></i> Pusat Bantuan - Balas Chat User</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="md:col-span-1">
                                <label class="text-sm font-semibold">Pilih Penyewa:</label>
                                <div id="user-list" class="mt-2 border rounded-lg h-96 overflow-y-auto bg-slate-50 scrollbar-hide"></div>
                            </div>
                            <div class="md:col-span-2 flex flex-col h-96">
                                <div class="font-semibold text-sm mb-2">Chat dengan: <span id="chat-with-user" class="text-indigo-600">...</span></div>
                                <div id="admin-chat-messages" class="flex-1 bg-slate-50 p-4 rounded-lg overflow-y-auto space-y-4 scrollbar-hide"></div>
                                <div class="mt-4 flex gap-2">
                                    <input type="text" id="admin-chat-input" class="flex-1 border rounded-lg p-2 text-sm" placeholder="Balas pesan...">
                                    <button onclick="adminKirimPesan()" class="bg-indigo-600 text-white px-4 rounded-lg text-sm font-bold">Kirim</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-lg shadow-slate-200/50">
                        <h2 id="form-title" class="font-bold text-lg mb-4 flex items-center gap-2"><i class="fa-solid fa-plus-circle text-indigo-500"></i> Tambah Unit Kontrakan Baru</h2>
                        <form id="property-form" class="space-y-4">
                            <input type="hidden" id="property-id">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="text-sm font-medium">Nama Unit *</label><input type="text" id="name" class="w-full mt-1 p-2 border rounded-lg" required></div>
                                <div><label class="text-sm font-medium">Kategori Kamar</label><select id="category" class="w-full mt-1 p-2 border rounded-lg bg-white"><option>Khusus Putra</option><option>Khusus Putri</option><option>Campuran</option><option>Pasutri</option></select></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="text-sm font-medium">Harga Sewa Bulanan (Rupiah)</label><input type="number" id="price" class="w-full mt-1 p-2 border rounded-lg" required></div>
                                <div><label class="text-sm font-medium">Status Ketersediaan</label><select id="status" class="w-full mt-1 p-2 border rounded-lg bg-white"><option>Tersedia (Kosong)</option><option>Penuh (Terisi)</option></select></div>
                            </div>
                            <div><label class="text-sm font-medium">Alamat Lengkap *</label><input type="text" id="address" class="w-full mt-1 p-2 border rounded-lg" required></div>
                            <div><label class="text-sm font-medium">Deskripsi & Fasilitas Kamar</label><textarea id="description" class="w-full mt-1 p-2 border rounded-lg" rows="3"></textarea></div>
                            <div><label class="text-sm font-medium">Foto Kamar</label><input type="file" id="images" multiple class="w-full mt-1 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"><div id="image-preview" class="mt-2 flex gap-2 flex-wrap"></div></div>
                            <div><label class="text-sm font-medium">Klik Peta Untuk Lokasi *</label><div id="admin-map" class="mt-1"></div><input type="hidden" id="lat" required><input type="hidden" id="lng" required></div>
                            <div class="flex gap-4 pt-4 border-t"><button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700">Simpan Unit</button><button type="button" id="cancel-edit-btn" class="hidden w-full bg-slate-200 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-300">Batal</button></div>
                        </form>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-lg shadow-slate-200/50 h-fit">
                    <h2 class="font-bold text-lg mb-4">Daftar Unit Terdaftar</h2>
                    <div id="property-list" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

<script>
  // 1. INISIALISASI SUPABASE - UDAH BENER URL-NYA
  const SUPABASE_URL = 'https://lcthwtuodeptpqzklkcf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ZgraWq9_s9uU5CRYio27Rg_SOtUVUBn';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 2. VARIABEL ELEMENT
  const loginScreen = document.getElementById('login-screen');
  const dashboardScreen = document.getElementById('dashboard-screen');
  const loginForm = document.getElementById('login-form');
  const logoutBtn = document.getElementById('logout-btn');
  const errorMsg = document.getElementById('error-msg');
  const statusEl = document.getElementById('connection-status');
  const userEmailEl = document.getElementById('user-email');
  const loginBtn = document.getElementById('login-btn');
  let adminMap, adminMarker, selectedUser = null;

  // 3. CEK SESSION PAS BUKA HALAMAN
  checkUserSession();
  async function checkUserSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        showDashboard(session.user);
    } else {
        showLogin();
    }
  }

  function showLogin() {
    loginScreen.classList.remove('hidden');
    dashboardScreen.classList.add('hidden');
  }

  async function showDashboard(user) {
    loginScreen.classList.add('hidden');
    dashboardScreen.classList.remove('hidden');
    userEmailEl.innerText = user.email;
    userEmailEl.classList.remove('hidden');
    await checkConnection();
    initAdminMap();
    loadProperties();
    loadUsersForChat();
  }

  // 4. FUNGSI LOGIN
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Memproses...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password,
    });

    if (error) {
      errorMsg.textContent = error.message;
    } else {
      showDashboard(data.user);
    }
    loginBtn.disabled = false;
    loginBtn.textContent = 'Login';
  });

  // 5. LOGOUT
  logoutBtn.addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    location.reload();
  });

  // 6. CEK KONEKSI
  async function checkConnection() {
    try {
        const { error } = await supabaseClient.from('properties').select('id').limit(1);
        if (error) throw error;
        statusEl.textContent = 'Connected';
        statusEl.className = 'text-xs font-semibold px-3 py-1.5 rounded-full bg-green-100 text-green-700';
    } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.className = 'text-xs font-semibold px-3 py-1.5 rounded-full bg-rose-100 text-rose-700';
    }
  }

  // 7. MAP
  function initAdminMap() {
    if (adminMap) return;
    adminMap = L.map('admin-map').setView([-6.322, 107.299], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(adminMap);
    adminMap.on('click', e => {
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lng').value = e.latlng.lng;
        if (adminMarker) adminMap.removeLayer(adminMarker);
        adminMarker = L.marker(e.latlng).addTo(adminMap);
    });
    setTimeout(() => { adminMap.invalidateSize() }, 100);
  }

  // 8. CRUD PROPERTIES
  const propertyForm = document.getElementById('property-form');
  propertyForm.addEventListener('submit', async e => {
    e.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Menyimpan...';

    const id = document.getElementById('property-id').value;
    const imageFiles = document.getElementById('images').files;
    let imageUrls = [];

    if (imageFiles.length > 0) {
        for (const file of imageFiles) {
            const filePath = `public/${Date.now()}-${file.name}`;
            const { error: uploadError } = await supabaseClient.storage.from('kontrakan-images').upload(filePath, file);
            if (uploadError) {
                alert('Error upload gambar: ' + uploadError.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Simpan Unit';
                return;
            }
            const { data } = supabaseClient.storage.from('kontrakan-images').getPublicUrl(filePath);
            imageUrls.push(data.publicUrl);
        }
    }

    const propertyData = {
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        address: document.getElementById('address').value,
        category: document.getElementById('category').value,
        status: document.getElementById('status').value,
        description: document.getElementById('description').value,
        lat: document.getElementById('lat').value,
        lng: document.getElementById('lng').value,
    };
    if (imageUrls.length > 0) propertyData.images = imageUrls;

    const { error } = id? await supabaseClient.from('properties').update(propertyData).eq('id', id) : await supabaseClient.from('properties').insert([propertyData]);

    if (error) {
        alert('Gagal menyimpan: ' + error.message);
    } else {
        resetForm();
        loadProperties();
    }
    submitBtn.disabled = false;
    submitBtn.textContent = 'Simpan Unit';
  });

  function resetForm() {
    propertyForm.reset();
    document.getElementById('property-id').value = '';
    document.getElementById('image-preview').innerHTML = '';
    document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus-circle text-indigo-500"></i> Tambah Unit Kontrakan Baru';
    document.getElementById('cancel-edit-btn').classList.add('hidden');
    if (adminMarker) adminMap.removeLayer(adminMarker);
  }
  document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

  async function loadProperties() {
    const { data, error } = await supabaseClient.from('properties').select('*').order('id', { ascending: false });
    const listContainer = document.getElementById('property-list');
    listContainer.innerHTML = '';
    if (error) {
        listContainer.innerHTML = `<p class="text-rose-500">Gagal memuat: ${error.message}</p>`;
        return;
    }
    if (data.length === 0) {
        listContainer.innerHTML = `<p class="text-slate-400 text-sm text-center">Belum ada unit</p>`;
        return;
    }
    data.forEach(prop => {
        const item = `<div class="p-3 bg-slate-50 rounded-lg border">
            <p class="font-bold text-sm">${prop.name}</p>
            <p class="text-xs text-slate-500">${prop.address}</p>
            <div class="flex justify-between items-center mt-2">
                <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${prop.status === 'Tersedia (Kosong)'? 'bg-green-100 text-green-700' : 'bg-rose-100 text-rose-700'}">${prop.status}</span>
                <div class="flex gap-2">
                    <button onclick="editProperty(${prop.id})" class="text-xs text-indigo-600 hover:text-indigo-800"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deleteProperty(${prop.id})" class="text-xs text-rose-600 hover:text-rose-800"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>`;
        listContainer.innerHTML += item;
    });
  }

  async function editProperty(id) {
    const { data } = await supabaseClient.from('properties').select('*').eq('id', id).single();
    document.getElementById('property-id').value = data.id;
    document.getElementById('name').value = data.name;
    document.getElementById('price').value = data.price;
    document.getElementById('address').value = data.address;
    document.getElementById('category').value = data.category;
    document.getElementById('status').value = data.status;
    document.getElementById('description').value = data.description;
    document.getElementById('lat').value = data.lat;
    document.getElementById('lng').value = data.lng;
    document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square text-indigo-500"></i> Edit Unit Kontrakan';
    document.getElementById('cancel-edit-btn').classList.remove('hidden');
    if (adminMarker) adminMap.removeLayer(adminMarker);
    if (data.lat && data.lng) {
        adminMarker = L.marker([data.lat, data.lng]).addTo(adminMap);
        adminMap.setView([data.lat, data.lng], 15);
    }
    window.scrollTo(0, 0);
  }

  async function deleteProperty(id) {
    if (confirm('Yakin hapus unit ini?')) {
        await supabaseClient.from('properties').delete().eq('id', id);
        loadProperties();
    }
  }

  // 9. CHAT
  async function loadUsersForChat() {
    const { data, error } = await supabaseClient.from('chats').select('sender').neq('sender', 'admin');
    if (error) {
        document.getElementById('user-list').innerHTML = `<p class="p-2 text-xs text-rose-500">Error: ${error.message}</p>`;
        return;
    }
    const users = [...new Set(data.map(item => item.sender))];
    const userListContainer = document.getElementById('user-list');
    if (users.length === 0) {
        userListContainer.innerHTML = '<p class="p-2 text-xs text-slate-400 text-center">Belum ada user chat</p>';
        return;
    }
    userListContainer.innerHTML = users.map(user => `
        <div onclick="selectUser('${user}')" class="p-2 text-sm cursor-pointer hover:bg-indigo-100 rounded-md ${selectedUser === user? 'bg-indigo-100 font-semibold' : ''}">
            <i class="fa-solid fa-user mr-2 text-xs"></i>${user}
        </div>
    `).join('');
  }

  function selectUser(username) {
    selectedUser = username;
    document.getElementById('chat-with-user').innerText = username;
    loadAdminMessages();
    loadUsersForChat();
  }

  async function loadAdminMessages() {
    if (!selectedUser) return;
    const { data, error } = await supabaseClient.from('chats').select('*').or(`sender.eq.${selectedUser},sender.eq.admin`).order('created_at', { ascending: true });
    if (error) return;
    const container = document.getElementById('admin-chat-messages');
    container.innerHTML = (data || []).map(m => {
        const isAdmin = m.sender === 'admin';
        return `<div class="flex ${isAdmin? 'justify-end' : 'justify-start'} items-end gap-2 text-xs mb-3">
            <div class="flex flex-col ${isAdmin? 'items-end' : 'items-start'}">
                <span class="text-[10px] text-slate-400 mb-1">${isAdmin? 'Admin' : m.sender}</span>
                <div class="p-2 rounded-lg ${isAdmin? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-800'} max-w-xs break-words">${m.message}</div>
            </div>
        </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  async function adminKirimPesan() {
    const input = document.getElementById('admin-chat-input');
    if (!input.value.trim() ||!selectedUser) return;
    const { error } = await supabaseClient.from('chats').insert([{ message: input.value, sender: 'admin' }]);
    if (error) { alert('Gagal kirim: ' + error.message); return; }
    input.value = '';
  }

  async function bersihkanChat() {
    if (confirm('Yakin mau hapus SEMUA history chat? Nggak bisa dibalikin!')) {
        const { error } = await supabaseClient.from('chats').delete().neq('id', 0);
        if (error) { alert('Gagal hapus: ' + error.message); return; }
        loadUsersForChat();
        document.getElementById('admin-chat-messages').innerHTML = '';
        selectedUser = null;
        document.getElementById('chat-with-user').innerText = '...';
        alert('Semua chat sudah dibersihkan.');
    }
  }

  // 10. REALTIME
  supabaseClient.channel('admin-chats')
 .on('postgres_changes', { event: '*', schema: 'public', table: 'chats' }, (payload) => {
      loadUsersForChat();
      if (selectedUser && (payload.new.sender === selectedUser || payload.new.sender === 'admin')) {
          loadAdminMessages();
      }
    })
 .subscribe();

  document.getElementById('admin-chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') adminKirimPesan(); });

  // 11. AUTO LOGOUT KALO SESSION EXPIRED
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
        location.reload();
    }
  });
</script>
</body>
</html>
