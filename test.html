<!DOCTYPE html>
<html>
<head>
  <title>Test Login - Final Boss</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test Login Kontrakan Pak David</h1>
  
  <input type="email" id="email" placeholder="admin@test.com" value="admin@test.com"><br><br>
  <input type="password" id="password" placeholder="password" value="admin123"><br><br>
  <button onclick="handleLogin()">Login</button>
  
  <p id="status">Siap tempur...</p>

  <script>
    const SUPABASE_URL = 'https://lchthwuodeptpzqklkcf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_ZgraWq9_s9uU5CRYio27Rg_SOtUVUBn';
    
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const status = document.getElementById('status');
      
      status.innerText = 'Loading...';
      
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        status.innerText = 'GAGAL: ' + error.message;
        console.error(error);
      } else {
        status.innerText = 'SUKSES LOGIN! User: ' + data.user.email;
        console.log('Data:', data);
      }
    }
  </script>
</body>
</html>
